# docker-compose.yml — Archim8 Neo4j
# No 'version:' key (Compose v2+ doesn't need it).
#
# Required env vars (set in .env, copied from .env.template):
#   NEO4J_AUTH               — neo4j/<password>
#
# Optional env vars (defaults shown — relative to this docker-compose.yml):
#   ARCHIM8_NEO4J_DATA_DIR  — override data dir  (default: ./data)
#   ARCHIM8_NEO4J_LOGS_DIR  — override logs dir  (default: ./logs)
#   ARCHIM8_NEO4J_IMPORT_DIR                      (default: ./import)
#   ARCHIM8_NEO4J_EXPORT_DIR                      (default: ./export)

services:
  neo4j:
    image: neo4j:5.15-community
    container_name: archim8-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser / HTTP API
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      - NEO4J_apoc_export_file_enabled=true
    volumes:
      - ${ARCHIM8_NEO4J_DATA_DIR:-./data}:/data
      - ${ARCHIM8_NEO4J_LOGS_DIR:-./logs}:/logs
      - ${ARCHIM8_NEO4J_IMPORT_DIR:-./import}:/import
      - ${ARCHIM8_NEO4J_EXPORT_DIR:-./export}:/export
      - ../config/init:/init
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-password}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # jQAssistant CLI — bytecode scanner (profile: jqa)
  #
  # Not started by default. Activated only when running:
  #   docker compose run --rm jqa <command>
  # or via: make jqa-scan / make jqa-install
  #
  # Build the image first:  make jqa-install
  # Run a scan:             make jqa-scan
  #
  # Volumes:
  #   /scan     — target Maven reactor (read-only)
  #   /jqassistant/config — Archim8 jqassistant.yml (read-only)
  #
  # Neo4j is reachable at bolt://neo4j:7687 via the shared Docker network.
  # ---------------------------------------------------------------------------
  jqa:
    profiles: ["jqa"]
    build:
      context: ../../../01_ingest/jqassistant
      args:
        JQA_VERSION: "2.9.1"
    image: archim8-jqa:2.9.1
    container_name: archim8-jqa
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ${ARCHIM8_TARGET_REPO}:/scan:ro
      - ../../../01_ingest/jqassistant/config:/jqassistant/config:ro
      - ../../../01_ingest/jqassistant/rules:/jqassistant/rules:ro
      - ../../../05_deliver/input/01_ingest/jqa-report:/jqassistant/report